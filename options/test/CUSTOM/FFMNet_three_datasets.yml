name: FMMNet_t234_200k_three_datasets_test
model_type: MambaIRv2Model
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  test_1:
    name: HM-TIR
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/datasets/hm_tir/val/gt
    dataroot_lq: /root/autodl-tmp/datasets/hm_tir/val/noise
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_2:
    name: Rivadeneira2020
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/datasets/Rivadeneira2020/val/gt
    dataroot_lq: /root/autodl-tmp/datasets/Rivadeneira2020/val/noise
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_3:
    name: WHT3H
    type: PairedImageDataset
    dataroot_gt: /root/autodl-tmp/datasets/WHT3H/val/gt
    dataroot_lq: /root/autodl-tmp/datasets/WHT3H/val/noise
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MambaIRv2
  upscale: 1
  in_chans: 3
  img_size: 128
  img_range: 1.
  d_state: 8
  depths: [3, 3, 3, 3]
  num_heads: [4, 4, 4, 4]
  window_size: 16
  inner_rank: 24
  num_tokens: 32
  convffn_kernel_size: 5
  mlp_ratio: 2.
  embed_dim: 104
  upsampler: ''
  resi_connection: 1conv

path:
  pretrain_network_g: /root/autodl-tmp/code/BasicSR-exp-fm3-b2-noprompt-hf-residual-mf/experiments/fm3_multipole_focalnet_b2_hf_residual_t234_200k_e104/models/net_g_latest.pth
  strict_load_g: true
  resume_state: ~

val:
  save_img: true
  suffix: ~
  use_image: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

dist_params:
  backend: nccl
  port: 29500