name: fm3_multipole_focalnet_b2_hf_residual_hmtir_20k_e144
model_type: MambaIRv2Model
scale: 1
num_gpu: 1
manual_seed: 10

datasets:
  train:
    name: hm_tir
    type: PairedImageDataset
    dataroot_gt: datasets/hm_tir/train/gt
    dataroot_lq: datasets/hm_tir/train/noise
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 128
    use_hflip: false
    use_rot: false
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: hm_tir_val
    type: PairedImageDataset
    dataroot_gt: datasets/hm_tir/val/gt
    dataroot_lq: datasets/hm_tir/val/noise
    io_backend:
      type: disk

network_g:
  type: MambaIRv2
  upscale: 1
  in_chans: 3
  img_size: 128
  img_range: 1.
  d_state: 8
  depths: [3, 3, 3, 3]
  num_heads: [4, 4, 4, 4]
  window_size: 16
  inner_rank: 24
  num_tokens: 32
  convffn_kernel_size: 5
  mlp_ratio: 2.
  embed_dim: 144

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: !!float 3e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [6000, 10000, 15000, 18000]
    gamma: 0.5
  total_iter: 20000
  warmup_iter: -1
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1
    reduction: mean
    eps: !!float 1e-3

val:
  val_freq: !!float 2e4
  save_img: false
  use_image: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
